pre-commit:
  parallel: true
  jobs:
    - name: format
      glob: "*.{ts,tsx,css,json}"
      run: bunx oxfmt -c .oxfmtrc.json --check {staged_files}

    - name: lint
      glob: "*.{ts,tsx}"
      run: bunx oxlint -c .oxlintrc.json {staged_files}

    - name: typecheck
      run: bun run typecheck

    - name: test
      run: bun run test:run
